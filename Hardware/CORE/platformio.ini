; =============================================================================
; PlatformIO Project Configuration — USV Muestreo Ambiental
; =============================================================================
; Arquitectura: FSM + FreeRTOS + HAL (LTE | WiFi) + MQTT + ArduinoJson
; Seleccionar transporte: compilar con -D USE_LTE  o  -D USE_WIFI
; =============================================================================

; ─── Configuración base común ─────────────────────────────────────────────────
[common]
platform  = espressif32
board     = esp32dev
framework = arduino
monitor_speed  = 115200
monitor_filters = default, esp32_exception_decoder
upload_speed   = 921600
test_framework = unity

; Dependencias compartidas por todos los entornos
lib_deps_common =
    bblanchon/ArduinoJson @ ^6
    okalachev/MAVLink
    adafruit/Adafruit MAX31865 library @ ^1.1.0
    vshymanskyy/TinyGSM @ ^0.12.0

; Build flags comunes (sin hardcoding de valores de negocio)
build_flags_common =
    -DCORE_DEBUG_LEVEL=3
    -Iinclude
    ; ── Pines de hardware ──────────────────────────────────────────────────
    -DPIN_TURBIDITY=34
    -DPIN_PH=35
    -DMAX31865_CS=5
    -DPIN_BATTERY=36
    ; ── GSM / UART ─────────────────────────────────────────────────────────
    -DGSM_TX=17
    -DGSM_RX=16
    -DGSM_BAUD=115200
    -DMAV_TX=2
    -DMAV_RX=4
    -DMAV_BAUD=57600
    ; ── APN y Broker ───────────────────────────────────────────────────────
    -DDEFAULT_APN=\"internet\"
    -DMQTT_BROKER=\"a3399dxn78u8zv-ats.iot.us-east-1.amazonaws.com\"
    -DMQTT_PORT=8883
    -DCLIENT_ID=\"USV-001\"
    ; ── Intervalos de misión (ms) ──────────────────────────────────────────
    -DSAMPLING_INTERVAL_MS=10000
    -DTELEMETRY_INTERVAL_MS=5000
    -DWATCHDOG_TIMEOUT_S=60
    ; ── Tamaño de stacks FreeRTOS (words) ─────────────────────────────────
    -DSTACK_TELEMETRY=4096
    -DSTACK_MISSION=4096
    -DSTACK_COMMS=6144
    ; ── Tópicos MQTT ──────────────────────────────────────────────────────
    -DTOPIC_STATUS=\"usv/general_status\"
    -DTOPIC_MISSION=\"usv/mision_data\"
    -DTOPIC_LOGS=\"usv/logs\"
    -DTOPIC_ORDERS=\"usv/orders\"

; ─── Entorno principal: transporte LTE (A7670SA) ──────────────────────────────
[env:usv_lte]
extends         = common
lib_ldf_mode    = deep+
lib_deps        =
    ${common.lib_deps_common}
build_flags     =
    ${common.build_flags_common}
    -DUSE_LTE
    -DTINY_GSM_MODEM_A7672X
    -DTINYGSM_RX_BUFFER_SIZE=2048
    ; Descomentar para activar consola de diagnóstico y calibración por Serial:
    ; -DENABLE_DIAGNOSTICS

; ─── Entorno principal: transporte WiFi ───────────────────────────────────────
[env:usv_wifi]
extends         = common
lib_deps        =
    ${common.lib_deps_common}
    knolleary/PubSubClient @ ^2.8
build_flags     =
    ${common.build_flags_common}
    -DUSE_WIFI
    -DWIFI_SSID=\"MOVISTAR_F3C2\"
    -DWIFI_PASS=\"eq8RuNvCCRejc6HQBW7m\"
    ; Descomentar para activar consola de diagnóstico y calibración por Serial:
     -DENABLE_DIAGNOSTICS

; ─── Tests unitarios ──────────────────────────────────────────────────────────
[env:test_sensors]
extends         = common
test_filter     = test_sensor_manager
lib_deps        =
    ${common.lib_deps_common}
build_flags     =
    ${common.build_flags_common}
    -DUSE_LTE
    -DTINY_GSM_MODEM_A7672X
    -DUNITY_INCLUDE_CONFIG_H

[env:test_mavlink]
extends         = common
test_filter     = test_mavlink_communication
lib_deps        =
    okalachev/MAVLink
build_flags     =
    ${common.build_flags_common}
    -DUNITY_INCLUDE_CONFIG_H

[env:test_modem]
extends         = common
test_filter     = test_modem_communication
lib_ldf_mode    = deep+
lib_deps        =
    vshymanskyy/TinyGSM @ ^0.12.0
build_flags     =
    ${common.build_flags_common}
    -DUSE_LTE
    -DTINY_GSM_MODEM_A7672X
    -DTINYGSM_RX_BUFFER_SIZE=2048
    -DUNITY_INCLUDE_CONFIG_H

; ─── Tests de hardware ────────────────────────────────────────────────────────
[env:hw_sensors]
extends         = common
test_filter     = test_hardware_sensors
lib_deps        =
    ${common.lib_deps_common}
build_flags     =
    ${common.build_flags_common}
    -DUSE_LTE
    -DTINY_GSM_MODEM_A7672X
    -DUNITY_INCLUDE_CONFIG_H

[env:hw_mavlink]
extends         = common
test_filter     = test_hardware_mavlink
lib_deps        =
    okalachev/MAVLink
build_flags     =
    ${common.build_flags_common}
    -DUNITY_INCLUDE_CONFIG_H

[env:hw_modem]
extends         = common
test_filter     = test_hardware_modem
lib_ldf_mode    = deep+
lib_deps        =
    vshymanskyy/TinyGSM @ ^0.12.0
build_flags     =
    ${common.build_flags_common}
    -DUSE_LTE
    -DTINY_GSM_MODEM_A7672X
    -DTINYGSM_RX_BUFFER_SIZE=2048
    -DUNITY_INCLUDE_CONFIG_H
